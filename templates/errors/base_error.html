{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="{% static 'favicon/1.png' %}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Error{% endblock %} — EduLMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#1a1a2e,#6c63ff);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .error-card{background:#fff;border-radius:24px;padding:50px 40px;max-width:500px;width:100%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.3);}
    .error-code{font-size:6rem;font-weight:900;line-height:1;color:#6c63ff;opacity:.15;}
    .error-icon{font-size:4rem;margin-bottom:10px;}
    .btn-home{background:#6c63ff;color:#fff;border:none;padding:12px 30px;border-radius:12px;font-weight:600;}
    .btn-home:hover{background:#574fd6;color:#fff;}
    .btn-back{background:transparent;color:#6c63ff;border:2px solid #6c63ff;padding:11px 30px;border-radius:12px;font-weight:600;}
    .btn-back:hover{background:#6c63ff;color:#fff;}
  
    @media(max-width:575px){
      .card{padding:28px 18px!important;margin:12px!important;}
      h1{font-size:3rem!important;}
      h3{font-size:1.1rem!important;}
    }
  </style>
</head>
<body>
<div class="error-card">
  <div class="error-code">{% block code %}???{% endblock %}</div>
  <div class="error-icon">{% block icon %}⚠️{% endblock %}</div>
  <h2 class="fw-bold mb-2">{% block heading %}Something went wrong{% endblock %}</h2>
  <p class="text-muted mb-4">{% block message %}An unexpected error occurred.{% endblock %}</p>
  <div class="d-flex gap-3 justify-content-center">
    <a href="javascript:history.back()" class="btn btn-back"><i class="bi bi-arrow-left me-1"></i>Go Back</a>
    <a href="/" class="btn btn-home"><i class="bi bi-house me-1"></i>Home</a>
  </div>
</div>
</body>
</html>
