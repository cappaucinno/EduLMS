{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="{% static 'favicon/1.png' %}">
  <title>{% block doc_title %}EduLMS Document{% endblock %}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--accent:#6c63ff;--dark:#1a1a2e;--text:#2d2d2d;--muted:#64748b;--light:#f8fafc;--border:#e2e8f0;}
    body{font-family:'Inter',sans-serif;color:var(--text);background:#fff;font-size:14px;line-height:1.7;}

    /* Top action bar — hidden on print */
    .action-bar{background:var(--dark);padding:10px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
    .action-bar .brand{color:#fff;font-weight:700;font-size:.95rem;}
    .action-bar .brand span{color:var(--accent);}
    .action-bar .actions{display:flex;gap:8px;}
    .btn-action{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:.82rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
    .btn-action.outline{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;}
    .btn-action:hover{opacity:.88;}

    /* Document wrapper */
    .doc-wrap{max-width:860px;margin:0 auto;padding:48px 48px 80px;}

    /* Header */
    .doc-header{border-bottom:3px solid var(--dark);padding-bottom:24px;margin-bottom:36px;}
    .doc-header .school{font-size:.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:6px;}
    .doc-header h1{font-size:2rem;font-weight:800;color:var(--dark);margin-bottom:8px;line-height:1.2;}
    .doc-header .meta{font-size:.82rem;color:var(--muted);display:flex;flex-wrap:wrap;gap:20px;margin-top:14px;}
    .doc-header .meta span{display:flex;align-items:center;gap:5px;}

    /* Sections */
    h2{font-size:1.15rem;font-weight:700;color:var(--dark);margin:32px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
    h3{font-size:1rem;font-weight:600;color:var(--dark);margin:22px 0 8px;}
    p{margin-bottom:12px;color:var(--text);}
    ul,ol{margin:8px 0 14px 20px;}
    li{margin-bottom:5px;}
    .highlight{background:var(--light);border-left:4px solid var(--accent);padding:12px 16px;border-radius:0 8px 8px 0;margin:16px 0;}
    .highlight p{margin:0;}
    .badge{display:inline-block;background:#e8e6ff;color:var(--accent);padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:600;}
    .badge.green{background:#d1fae5;color:#065f46;}
    .badge.red{background:#fee2e2;color:#991b1b;}
    .badge.yellow{background:#fef3c7;color:#92400e;}

    table{width:100%;border-collapse:collapse;margin:16px 0;}
    th{text-align:left;padding:8px 12px;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:var(--light);border-bottom:1px solid var(--border);}
    td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:.88rem;}
    tr:last-child td{border-bottom:none;}

    .toc{background:var(--light);border-radius:12px;padding:20px 24px;margin-bottom:32px;}
    .toc h3{margin:0 0 12px;font-size:.85rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
    .toc ol{margin-left:16px;}
    .toc a{color:var(--accent);text-decoration:none;font-size:.88rem;}
    .toc a:hover{text-decoration:underline;}

    .page-break{border:none;border-top:2px dashed var(--border);margin:40px 0;}


    /* ── Mobile Responsive ── */
    @media(max-width:768px){
      .action-bar{flex-wrap:wrap;padding:8px 16px;gap:8px;}
      .action-bar .actions{flex-wrap:wrap;}
      .doc-wrap{padding:20px 16px 60px;}
      .doc-header h1{font-size:1.6rem;}
      h2{font-size:1.05rem;}
      table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;}
      .toc{padding:14px 16px;}
    }
    @media(max-width:480px){
      .doc-wrap{padding:14px 12px 48px;}
      .doc-header .meta{flex-direction:column;gap:8px;}
      .btn-action{padding:6px 12px;font-size:.75rem;}
    }

    @media print{
      .action-bar{display:none!important;}
      .doc-wrap{padding:24px;}
      body{font-size:12px;}
      h2{margin-top:20px;}
      .page-break{page-break-after:always;border:none;}
      a{color:inherit;text-decoration:none;}
    }
  </style>
</head>
<body>

<div class="action-bar">
  <div class="brand">EduLMS &nbsp;<span>{% block doc_type %}Document{% endblock %}</span></div>
  <div class="actions">
    <button class="btn-action outline" onclick="window.print()">🖨️ Print / Save PDF</button>
    <a class="btn-action" href="/superadmin/">← Back</a>
  </div>
</div>

<div class="doc-wrap">
  {% block content %}{% endblock %}
</div>

</body>
</html>
