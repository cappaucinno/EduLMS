{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="{% static 'favicon/1.png' %}">
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password — EduLMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#1a1a2e,#6c63ff);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 0;}
    .card{border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:440px;width:100%;border:none;}
    .brand{font-size:1.6rem;font-weight:800;color:#6c63ff;}
    .btn-primary{background:#6c63ff;border:none;border-radius:10px;padding:11px;font-weight:600;}
    .btn-primary:hover{background:#574fd6;}
    .form-control{border-radius:10px;padding:10px 15px;}
    .strength-bar{height:5px;border-radius:3px;margin-top:6px;transition:all .3s;background:#eee;}
    .strength-text{font-size:11px;margin-top:3px;}
  
    /* Mobile responsive additions */
    @media(max-width:575.98px){
      .card{border-radius:14px!important;margin:12px;}
      input[type="text"],input[type="email"],input[type="password"]{font-size:16px!important;}
      .form-control{font-size:16px!important;}
      h5{font-size:1.15rem!important;}
    }
    @media(max-width:360px){
      .card{margin:6px;padding:18px 14px!important;}
    }
  </style>
</head>
<body>
<div class="card p-4">
  <div class="text-center mb-4">
    <div class="brand"><i class="bi bi-mortarboard-fill"></i> EduLMS</div>
    <div style="width:52px;height:52px;background:#f0eeff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:14px auto 6px;">
      <i class="bi bi-shield-lock-fill text-primary fs-4"></i>
    </div>
    <h5 class="fw-bold mb-1">Set New Password</h5>
    <p class="text-muted small">Must be at least 8 characters.</p>
  </div>

  {% if form.non_field_errors %}
    <div class="alert alert-danger">{{ form.non_field_errors }}</div>
  {% endif %}

  <form method="post" action="/accounts/reset-password/{{ token }}/">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-bold small">New Password</label>
      {{ form.password }}
      <div class="strength-bar" id="strengthBar"></div>
      <div class="strength-text text-muted" id="strengthText"></div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-bold small">Confirm New Password</label>
      {{ form.password2 }}
      {% if form.password2.errors %}<div class="text-danger small mt-1">{{ form.password2.errors }}</div>{% endif %}
    </div>
    <button type="submit" class="btn btn-primary w-100">
      <i class="bi bi-check-lg me-1"></i> Save New Password
    </button>
  </form>
</div>
<script>
const pwInput = document.querySelector('[name="password"]');
const bar  = document.getElementById('strengthBar');
const text = document.getElementById('strengthText');
const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71'];
const labels = ['Weak','Fair','Good','Strong'];
pwInput?.addEventListener('input', () => {
  const v = pwInput.value;
  let score = 0;
  if(v.length >= 8) score++;
  if(/[A-Z]/.test(v)) score++;
  if(/[0-9]/.test(v)) score++;
  if(/[^A-Za-z0-9]/.test(v)) score++;
  bar.style.width  = (score * 25) + '%';
  bar.style.background = colors[score-1] || '#eee';
  text.textContent = v.length ? labels[score-1] || '' : '';
  text.style.color = colors[score-1] || '#aaa';
});
</script>
</body>
</html>
