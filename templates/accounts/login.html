{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <link rel="icon" type="image/png" href="{% static 'favicon/1.png' %}">
  <title>Login — EduLMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:linear-gradient(135deg,#1a1a2e,#6c63ff);
      min-height:100vh;min-height:-webkit-fill-available;
      display:flex;align-items:center;justify-content:center;
      padding:16px;font-family:'Segoe UI',system-ui,sans-serif;
    }
    .auth-card{
      background:#fff;border-radius:clamp(14px,3vw,22px);
      box-shadow:0 20px 60px rgba(0,0,0,.28);
      width:100%;max-width:430px;
      padding:clamp(24px,5vw,40px) clamp(20px,5vw,36px);
    }
    .brand{font-size:clamp(1.5rem,5vw,2rem);font-weight:800;color:#6c63ff;text-align:center;}
    .brand-sub{text-align:center;color:#888;font-size:clamp(.78rem,2.5vw,.88rem);margin-bottom:24px;}
    .form-control,.form-select{
      border-radius:10px;
      padding:clamp(9px,2vw,11px) clamp(12px,2vw,15px);
      font-size:clamp(14px,3.5vw,15px); /* 16px prevents iOS zoom */
    }
    .form-label{font-weight:600;font-size:clamp(.8rem,2.5vw,.88rem);}
    .btn-primary{
      background:#6c63ff;border:none;border-radius:10px;
      padding:clamp(10px,2.5vw,12px);
      font-size:clamp(.9rem,3vw,1rem);font-weight:600;width:100%;
    }
    .btn-primary:hover{background:#574fd6;}
    .btn-primary:active{background:#4a3ec0;}
    a{color:#6c63ff;}
    /* Touch-friendly min height for inputs */
    .form-control,.btn-primary{min-height:44px;}
    @media(max-width:360px){
      .auth-card{padding:20px 16px;}
    }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="brand"><i class="bi bi-mortarboard-fill"></i> EduLMS</div>
  <div class="brand-sub">High School Learning System</div>

  {% if form.errors %}
    <div class="alert alert-danger py-2 small">Invalid username or password.</div>
  {% endif %}
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags|default:'info' }} py-2 small">{{ msg }}</div>
    {% endfor %}
  {% endif %}

  <form method="post" action="/accounts/login/">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Enter username" autocomplete="username" required autofocus>
    </div>
    <div class="mb-2">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter password" autocomplete="current-password" required>
    </div>
    <p class="text-center mb-3"><a href="/accounts/forgot-password/" class="text-muted" style="font-size:.83rem;">Forgot password?</a></p>
    <button type="submit" class="btn btn-primary">Sign In</button>
  </form>

  <p class="text-center mt-3 mb-0" style="font-size:.85rem;">
    No account? <a href="/accounts/register/" style="font-weight:600;">Register</a>
  </p>
</div>
</body>
</html>
