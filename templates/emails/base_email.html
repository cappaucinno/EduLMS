<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  body{margin:0;padding:0;background:#f4f6fb;font-family:'Segoe UI',Arial,sans-serif;}
  .wrap{max-width:580px;margin:32px auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08);}
  .header{background:#1a1a2e;padding:28px 32px;text-align:center;}
  .header h1{color:#6c63ff;font-size:22px;margin:0;font-weight:700;letter-spacing:.5px;}
  .header p{color:#888;font-size:12px;margin:4px 0 0;letter-spacing:1px;text-transform:uppercase;}
  .body{padding:32px;}
  .body h2{font-size:18px;color:#1a1a2e;margin:0 0 12px;font-weight:600;}
  .body p{font-size:14px;color:#444;line-height:1.7;margin:0 0 14px;}
  .highlight{background:#f0eeff;border-left:4px solid #6c63ff;padding:12px 16px;border-radius:0 8px 8px 0;margin:16px 0;}
  .highlight p{margin:0;color:#3a3270;font-weight:500;}
  .btn{display:inline-block;background:#6c63ff;color:#fff;padding:12px 28px;border-radius:10px;text-decoration:none;font-size:14px;font-weight:600;margin:16px 0;}
  .footer{background:#f9f8f5;padding:18px 32px;text-align:center;border-top:1px solid #eee;}
  .footer p{font-size:11px;color:#aaa;margin:0;}
  .badge{display:inline-block;background:#e8e6ff;color:#534ab7;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600;}
  .divider{border:none;border-top:1px solid #eee;margin:20px 0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>&#127979; {{ school_name }}</h1>
    <p>Learning Management System</p>
  </div>
  <div class="body">
    {% block email_body %}{% endblock %}
  </div>
  <div class="footer">
    <p>This is an automated message from {{ school_name }} LMS. Please do not reply to this email.</p>
    <p style="margin-top:4px;">&#169; {{ year }} {{ school_name }}</p>
  </div>
</div>
</body>
</html>
