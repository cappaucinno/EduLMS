{% extends 'superadmin/base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}
{% block content %}
<div class="card p-4 text-center" style="max-width:440px">
  <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
  <h5>Delete User?</h5>
  <p class="text-muted">Delete <strong>{{ obj }}</strong>? All their data will be removed. This cannot be undone.</p>
  <form method="post" class="d-flex gap-2 justify-content-center">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="/superadmin/users/" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
