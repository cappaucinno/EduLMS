{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}
{% block content %}
<div class="card p-4 text-center" style="max-width:460px">
  <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
  <h5 class="mt-3">Delete {{ type }}?</h5>
  <p class="text-muted">Are you sure you want to delete <strong>{{ obj }}</strong>?<br>This cannot be undone.</p>
  <form method="post" class="d-flex gap-2 justify-content-center">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="/teacher/dashboard/" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
